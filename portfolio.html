<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Портфолио - ЛИНЕСС</title>
    <link rel="stylesheet" href="eofcss3/EOFCSSVariables3.css">
    <link rel="stylesheet" href="eofcss3/EOFCSSReset3.css">
    <link rel="stylesheet" href="eofcss3/EOFcursor3.css">
    <link rel="stylesheet" href="eofcss3/EOFNavigation3.css">
    <link rel="stylesheet" href="eofcss3/EOFContainer3.css">
    <link rel="stylesheet" href="eofcss3/EOFSectionStyles3.css">
    <link rel="stylesheet" href="eofcss3/EOFButtons3.css">
    <link rel="stylesheet" href="eofcss3/EOFAnimations3.css">
    <link rel="stylesheet" href="eofcss3/EOFPortfolioSection3.css">
    <link rel="stylesheet" href="eofcss3/EOFPortfolioImg3.css">
    <link rel="stylesheet" href="eofcss3/EOFAboutSection3.css">
    <link rel="stylesheet" href="eofcss3/EOFServiceSection3.css">
    <link rel="stylesheet" href="eofcss3/EOFResponsive3.css">
    <link rel="stylesheet" href="eofcss3/EOFUtility3.css">
    <link rel="stylesheet" href="eofcss3/EOFFooterExtended3.css">
    <link rel="stylesheet" href="eofcss3/EOFResponsiveFooter3.css">
    <link rel="stylesheet" href="eofcss3/EOFGlobalBackground3.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="header-include"></div>

    <section class="portfolio" style="padding-top: 120px;">
        <div class="container">
            <div class="section-header">
                <span class="section-label">Open Source</span>
                <h1 class="section-title">Наши проекты</h1>
                <p style="color: var(--color-text-secondary); font-size: 1.125rem; max-width: 600px; margin: 16px auto 0;">
                    Открытые инструменты и библиотеки для разработчиков
                </p>
                <div class="portfolio-filters" style="margin-top: 40px;">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="opensource">Open Source</button>
                    <button class="filter-btn" data-filter="web">Веб</button>
                    <button class="filter-btn" data-filter="education">Образование</button>
                    <button class="filter-btn" data-filter="collaboration">Коллаборация</button>
                </div>
            </div>
            <div class="portfolio-grid" id="portfolioGrid" style="margin-top: 60px;"></div>
        </div>
    </section>

    <div class="footer-include"></div>

    <script src="eofjs3/EOFcursor3.js"></script>
    <script src="eofjs3/EOFNavigation3.js"></script>
    <script src="eofjs3/EOFScrollReveal3.js"></script>
    <script src="eofjs3/EOFPortfolioLoader3.js"></script>
    <script src="eofjs3/EOFPortfolioFilterDynamic3.js"></script>
    <script src="eofjs3/EOFInit3.js"></script>
    <script src="eofjs3/EOFGlobalBackground3.js"></script>
    <script>
        fetch('special/header.html').then(r => r.text()).then(html => {
            document.querySelector('.header-include').innerHTML = html;
        });
        fetch('special/footer.html').then(r => r.text()).then(html => {
            document.querySelector('.footer-include').innerHTML = html;
        });
    </script>
</body>
</html>
